# https://www.home-assistant.io/integrations/script/

speak_announcement:
  alias: Speak Announcement via Wallpanel
  icon: mdi:bell-badge
  fields:
    message:
      name: Message
      description: The message to say
      required: true
      selector:
        text:
  sequence:
    - alias: Make an announcement on tablet
      choose:
        - conditions:
            - condition: state
              entity_id: input_boolean.anyone_home
              state: "on"
          sequence:
            - action: dashie.speak
              data:
                device_id: media_player.samsung_galaxy_tab_s_10_5_speaker
                message: "{{ message }}"
