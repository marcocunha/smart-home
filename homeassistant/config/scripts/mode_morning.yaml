mode_morning:
  alias: Set the entities according to the morning mode
  mode: single
  sequence:
    - alias: "Set variables"
      variables:
        active_mode: MORNING
        covers_to_open:
          - cover.curtains_livingroom_right
          - cover.curtains_livingroom_left
          - cover.estores_escritorio
          - cover.curtains_guestroom
          - cover.estores_lavandaria
          - cover.curtains_suite
          - cover.curtains_wcsuite
          - cover.curtains_kitchen
        curtains_to_open_partially:
          - cover.curtains_hall
        desired_position_percentage: 20
        switches_to_turn_on: []
        lights_to_turn_on: []
        lights_to_turn_off:
          - light.zigbee_smartpowerplug_1 # Luz presença Marco
          - light.candeeiro_ambiente_2 # Candeeiro ambiente
          - light.switch_tomada_poltrona # Luz tomada poltrona
          - light.plug_candeeiro_presenca_hall # Candeeiro presença hall

    - alias: "Set active mode"
      action: input_text.set_value
      data:
        value: "{{ active_mode }}"
      target:
        entity_id: input_text.active_mode

    - alias: "Open covers"
      action: cover.open_cover
      target:
        entity_id: "{{ covers_to_open | default([]) }}"

    - alias: "Set cover position for partial open"
      action: cover.set_cover_position
      data:
        position: "{{ desired_position_percentage }}"
      target:
        entity_id: "{{ curtains_to_open_partially | default([]) }}"

    - alias: "Turn ON specified switches"
      action: switch.turn_on
      target:
        entity_id: "{{ switches_to_turn_on | default([]) }}"

    - alias: "Turn ON specified lights"
      action: light.turn_on
      target:
        entity_id: "{{ lights_to_turn_on | default([]) }}"

    - alias: "Turn OFF specified lights"
      action: light.turn_off
      target:
        entity_id: "{{ lights_to_turn_off | default([]) }}"
