title: Home
icon: mdi:home
path: home-office
type: sidebar
cards:
  - type: horizontal-stack
    cards:
      - type: custom:mushroom-chips-card
        chips:
          - type: entity
            entity: person.marco_cunha
            use_entity_picture: true
            content_info: state
          - type: entity
            entity: person.darlene_parreira
            use_entity_picture: true
            content_info: state
          - type: alarm-control-panel
            entity: alarm_control_panel.ajax_security_system
          - type: entity
            entity: cover.curtains_group
            name: Estores
            content_info: state
            tap_action:
              action: toggle
            icon_color: amber
          - type: entity
            entity: cover.garage_door
            tap_action:
              action: toggle
            hold_action:
              action: none
            double_tap_action:
              action: none
            name: Garagem
            content_info: name
            icon_color: amber
      - type: custom:mushroom-chips-card
        chips:
          - type: template
            entity: sensor.count_lights_on
            icon_color: "{{ 'amber' if states('sensor.count_lights_on')|int(0) > 0}}"
            name: Luzes Ligadas
            icon: mdi:lamps
            content: "{{ states('sensor.count_lights_on')|int(0)}}"
            tap_action:
              action: none
            hold_action:
              action: none
            double_tap_action:
              action: none
          - type: template
            entity: sensor.count_doors_open
            icon_color: "{{ 'amber' if states('sensor.count_doors_open')|int(0) > 0}}"
            name: Portas Abertas
            icon: mdi:door
            content: "{{ states('sensor.count_doors_open')|int(0)}}"
            tap_action:
              action: none
            hold_action:
              action: none
            double_tap_action:
              action: none
          - type: entity
            entity: sensor.sensor_temperature_humidity_escritorio_temperature
            icon_color: deep-orange
          - type: entity
            entity: sensor.sensor_temperature_humidity_escritorio_humidity
            icon_color: blue
          - type: action
            tap_action:
              action: navigate
              navigation_path: "#tablet-extra-options"
            icon: mdi:dots-horizontal

  - type: horizontal-stack
    cards:
      - type: custom:mushroom-title-card
  - square: false
    columns: 2
    type: grid
    cards:
      - type: vertical-stack
        cards:
          - type: vertical-stack
            cards:
              - type: custom:hourly-weather
                entity: weather.openweathermap
                num_segments: 9 # optional, defaults to 12
                name: null # optional, defaults to "Hourly Weather"
                show_precipitation_amounts: true
                show_precipitation_probability: true
                icons: true
                colors:
                  sunny: yellow
              - type: horizontal-stack
                cards:
                  - show_name: false
                    show_icon: true
                    show_state: true
                    type: glance
                    entities:
                      - entity: sensor.sensor_temperature_humidity_escritorio_temperature
                      - entity: sensor.sensor_temperature_humidity_escritorio_humidity
                    columns: 2
                    theme: minimalist-desktop
                    title: Escritório
                  - features:
                      - type: target-temperature
                      - type: climate-hvac-modes
                        hvac_modes:
                          - heat
                          - cool
                          - auto
                          - "off"
                    type: tile
                    entity: climate.ac_escritorio_ac_escritorio
                    state_content:
                      - state
                      - current_temperature
                    icon: mdi:air-conditioner

              - type: horizontal-stack
                cards:
                  - type: tile
                    entity: cover.estores_escritorio
                    vertical: true
                    name: Estores
                    tap_action:
                      action: more-info
                    hold_action:
                      action: more-info
                    double_tap_action:
                      action: more-info
                    # card_mod:
                    #   style: |
                    #     ha-card {
                    #         --card-primary-font-size: 1.2rem;
                    #         border: none;
                    #         box-shadow: none;
                    #         background: rgba(0,0,0,0);
                    #     }
                  - type: gauge
                    entity: sensor.sun_solar_elevation
                    needle: false
                    theme: ios-dark-mode-blue-red
                    name: Elevação Sol
                  - type: gauge
                    entity: sensor.sensor_presence_office_illuminance
                    unit: lx
                    theme: ios-dark-mode-blue-red-alternative
                    needle: false
                    name: Iluminação
                    max: 10
                    severity:
                      green: 0
                      yellow: 1000
                      red: 2000
              - type: custom:mushroom-title-card
      - type: vertical-stack
        cards:
          - type: horizontal-stack
            cards:
              - type: "custom:button-card"
                entity: light.light_office_leds
                icon: mdi:led-strip-variant
                show_state: false
                name: LEDs
                state:
                  - value: "on"
                    color: rgb(255,191,0)
                  - value: "off"
                    color: rgb(255,255,255)
                styles:
                  card:
                    - --mdc-ripple-color: rgb(255,191,0)
                    - --mdc-ripple-press-opacity: 0.5
                    - font-size: 15px
                aspect_ratio: 1/1
                tap_action:
                  action: more-info
                hold_action:
                  action: more-info
                double_tap_action:
                  action: more-info
              - type: "custom:button-card"
                entity: light.office_light
                icon: mdi:chair-rolling
                show_state: false
                name: Escritório
                state:
                  - value: "on"
                    color: rgb(255,191,0)
                  - value: "off"
                    color: rgb(255,255,255)
                styles:
                  card:
                    - --mdc-ripple-color: rgb(255,191,0)
                    - --mdc-ripple-press-opacity: 0.5
                    - font-size: 15px
                aspect_ratio: 1/1
                tap_action:
                  action: toggle
                hold_action:
                  action: more-info
                double_tap_action:
                  action: more-info
              - type: "custom:button-card"
                entity: cover.portao_exterior
                show_state: false
                name: Portão
                state:
                  - value: "open"
                    color: rgb(255,191,0)
                  - value: "closed"
                    color: rgb(255,255,255)
                styles:
                  card:
                    - --mdc-ripple-color: rgb(255,191,0)
                    - --mdc-ripple-press-opacity: 0.5
                    - font-size: 15px
                aspect_ratio: 1/1
                tap_action:
                  action: toggle
                hold_action:
                  action: more-info
                double_tap_action:
                  action: more-info

              - type: custom:mushroom-template-card
                layout: vertical
                fill_container: true
                entity: switch.resistencia_termoacumulador_switch_0
                primary: Água Quente
                secondary: "{{ states('sensor.hot_water_temperature')|float(0)|round(0)}}ºC"
                icon: mdi:water-thermometer-outline
                icon_color: "{{ 'amber' if is_state('switch.resistencia_termoacumulador_switch_0', 'on') else 'grey' }}"
                badge_icon: "{{ 'mdi:thermometer-low' if (states('sensor.hot_water_temperature')|float(0) < states('input_number.desired_hot_water_temperature')|float) else '' }}"
                badge_color: maroon
                tap_action:
                  action: toggle
                hold_action:
                  action: navigate
                  navigation_path: "#tablet-extra-options"
          - type: horizontal-stack
            cards:
              - type: custom:mushroom-template-card
                primary: Morning
                secondary: ""
                icon: mdi:sun-angle-outline
                icon_color: yellow
                layout: vertical
                tap_action:
                  action: call-service
                  service: script.mode_morning
                  data: {}
              - type: custom:mushroom-template-card
                primary: "  Night"
                secondary: ""
                icon: mdi:weather-night
                icon_color: blue
                layout: vertical
                tap_action:
                  action: call-service
                  service: script.mode_night
                  target: {}
              - type: custom:mushroom-template-card
                primary: Fresco
                secondary: ""
                icon: mdi:coolant-temperature
                icon_color: green
                layout: vertical
                tap_action:
                  action: call-service
                  service: script.mode_cool_down
                  target: {}
              - type: custom:mushroom-template-card
                primary: Bed
                secondary: ""
                icon: mdi:bed-single-outline
                icon_color: purple
                layout: vertical
                tap_action:
                  action: call-service
                  service: script.mode_sleep
                  target: {}

          - type: horizontal-stack
            cards:
              - type: vertical-stack
                cards:
                  - type: gauge
                    entity: sensor.contador_consumo_channel_1_power
                    name: Energia
                    unit: W
                    min: -4000
                    max: 5000
                    needle: true
                    severity:
                      green: -5000
                      yellow: 0
                      red: 2000
                  - type: horizontal-stack
                    cards:
                      - type: custom:mushroom-entity-card
                        entity: sensor.monthly_energy
                        name: Consumo mensal
                        icon: mdi:lightning-bolt
                        icon_color: amber
                        primary_info: state
                        secondary_info: name
                      - type: custom:mushroom-template-card
                        entity: sensor.monthly_energy
                        primary: >
                          {{ (states('sensor.monthly_energy') | float(0) *
                          states('input_number.static_price_per_kwh') | float(0)) | round(2) }} €
                        secondary: Custo Est.
                        icon: mdi:cash
                        icon_color: green
                        tap_action:
                          action: navigate
                          navigation_path: /energy
  - type: custom:mini-media-player
    entity: media_player.denon_home_150
    group: false
    volume_stateless: true
    toggle_power: true
    artwork: material
    sound_mode: full
    info: scroll
    source: full
    replace_mute: play_stop
    view_layout:
      position: main

  - type: custom:bubble-card
    card_type: pop-up
    hash: "#tablet-extra-options"
    cards:
      - type: custom:bubble-card
        card_type: button
        button_type: switch
        entity: input_boolean.force_hot_water_off
        name: Disable Hot Water Automation
        icon: mdi:water-boiler-off
        scrolling_effect: true
        show_icon: true
        force_icon: true
        show_state: true
        show_attribute: false
        show_name: true
        card_layout: large
        show_last_changed: false
        styles: |
          .bubble-name-container {
            color: ${state === 'on' ? 'black' : ''} !important;
          }
      - type: custom:bubble-card
        card_type: button
        button_type: switch
        entity: input_boolean.force_hot_water_on
        name: Enable Hot Water Automation
        icon: mdi:water-boiler
        scrolling_effect: true
        show_icon: true
        force_icon: true
        show_state: true
        show_attribute: false
        show_name: true
        card_layout: large
        show_last_changed: false
        styles: |
          .bubble-name-container {
            color: ${state === 'on' ? 'black' : ''} !important;
          }

  - type: custom:bubble-card
    card_type: pop-up
    hash: "#tablet-cameras"
    width_desktop: 840px
    auto_close: 20000 #20s
    margin_top_desktop: calc(100vh - 900px)
    cards:
      - square: false
        columns: 2
        type: grid
        title: Cameras
        cards:
          - type: custom:webrtc-camera
            url: rtsp://192.168.1.242:8554/frente_low?mp4
            server: http://192.168.1.242:1984/
            ui: true
            media: video
            poster: https://home-assistant.io/images/cast/splash.png
            muted: true
            background: false
            mode: mse,hls,mjpeg
            intersection: 0.75
            style: >-
              video {object-fit: fill;} .screenshot {display: none}
              .pictureinpicture {display: none}
          - type: custom:webrtc-camera
            url: rtsp://192.168.1.242:8554/garagem_low?mp4
            server: http://192.168.1.242:1984/
            ui: true
            media: video
            poster: https://home-assistant.io/images/cast/splash.png
            muted: true
            background: false
            mode: mse,hls,mjpeg
            intersection: 0.75
            style: >-
              video {object-fit: fill;} .screenshot {display: none}
              .pictureinpicture {display: none}
          - type: custom:webrtc-camera
            url: rtsp://192.168.1.242:8554/piscina_low?mp4
            server: http://192.168.1.242:1984/
            ui: true
            media: video
            poster: https://home-assistant.io/images/cast/splash.png
            muted: true
            background: false
            mode: mse,hls,mjpeg
            intersection: 0.75
            style: >-
              video {object-fit: fill;} .screenshot {display: none}
              .pictureinpicture {display: none}
          - type: custom:webrtc-camera
            url: rtsp://192.168.1.242:8554/traseiras_low?mp4
            server: http://192.168.1.242:1984/
            ui: true
            media: video
            poster: https://home-assistant.io/images/cast/splash.png
            muted: true
            background: false
            mode: mse,hls,mjpeg
            intersection: 0.75
            style: >-
              video {object-fit: fill;} .screenshot {display: none}
              .pictureinpicture {display: none}

  - type: custom:bubble-card
    card_type: pop-up
    hash: "#vacuum-popup"
    width_desktop: 640px
    margin_top_desktop: calc(100vh - 900px)
    cards:
      - type: custom:xiaomi-vacuum-map-card
        vacuum_platform: default
        entity: vacuum.l40s_pro_ultra
        debug: false
        map_source:
          camera: camera.l40s_pro_ultra_map
        calibration_source:
          camera: true
        map_locked: true
        two_finger_pan: false

  - type: custom:bubble-card
    card_type: horizontal-buttons-stack
    hide_gradient: true
    1_name: Cameras
    1_icon: mdi:cctv
    1_link: "#tablet-cameras"
    1_entity: light.kitchen
    2_name: Rosita
    2_icon: mdi:robot-vacuum
    2_link: "#vacuum-popup"
